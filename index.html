<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>義政くん 〜東山ものしり問答〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Zen+Maru+Gothic:wght@500;700;900&family=Klee+One:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --sumi:#15171c;       /* 墨 */
    --sumi2:#1e2128;
    --kin:#b9c0c9;        /* 銀 */
    --kin-akarui:#e3e7ec;
    --aka:#3f6d7a;        /* 藍 */
    --aka-fuka:#284a55;
    --washi:#f2ece0;      /* 和紙 */
    --washi-kage:#ddd5c3;
    --midori:#6f7d52;     /* 苔 */
    --sumi-usu:rgba(242,236,224,.7);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Zen Maru Gothic',sans-serif;
    background:
      radial-gradient(ellipse at 50% -10%, #2b313b 0%, transparent 55%),
      radial-gradient(ellipse at 50% 120%, #20242c 0%, transparent 55%),
      var(--sumi);
    color:var(--washi);
    min-height:100%;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
    position:relative;
  }
  /* 和紙テクスチャ風のノイズ */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.012) 0 1px, transparent 1px 3px);
    pointer-events:none;z-index:0;
  }

  /* ヘッダー（のぼり旗風） */
  header{
    position:relative;z-index:2;
    text-align:center;
    padding:18px 16px 10px;
    border-bottom:3px solid var(--kin);
    background:linear-gradient(180deg, rgba(40,74,85,.35), transparent);
  }
  .mon{
    display:inline-flex;align-items:center;gap:14px;
  }
  .mon-maru{
    width:46px;height:46px;border-radius:50%;
    border:3px solid var(--kin);
    display:grid;place-items:center;
    font-family:'Yuji Syuku',serif;font-size:24px;color:var(--kin-akarui);
    background:radial-gradient(circle,#2b313b,#15171c);
  }
  h1{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(28px,4.2vw,52px);
    color:var(--kin-akarui);
    letter-spacing:.12em;
    text-shadow:0 2px 0 #000,0 0 18px rgba(185,192,201,.35);
  }
  .sub{
    font-size:clamp(13px,1.5vw,18px);
    color:var(--sumi-usu);
    margin-top:4px;letter-spacing:.18em;
  }

  /* メイン舞台 */
  main{
    position:relative;z-index:2;
    flex:1;
    width:min(1100px,94vw);
    margin:0 auto;
    padding:22px 0 30px;
    display:flex;flex-direction:column;gap:20px;
  }

  /* 義政の語り場 */
  .stage{
    display:flex;align-items:flex-start;gap:22px;
  }
  .nobunaga{
    flex:0 0 auto;
    width:clamp(120px,15vw,180px);
    text-align:center;
  }
  .face{
    width:clamp(120px,15vw,180px);
    height:clamp(120px,15vw,180px);
    border-radius:50%;
    overflow:hidden;
    background:#1e2128;
    border:5px solid var(--kin);
    box-shadow:0 0 0 4px var(--sumi),0 10px 30px rgba(0,0,0,.5);
    position:relative;
    transition:transform .25s;
  }
  .face .mouth{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    display:block;
  }
  .face .mouth.closed{z-index:1;}
  .face .mouth.open{z-index:2;opacity:0;}   /* ふだんは閉じた口。話すとき重ねて見せる */
  .face.talking-open .mouth.open{opacity:1;}
  .face.no-img .mouth{display:none;}
  .face-fallback{
    display:none;
    position:absolute;inset:0;z-index:3;
    width:100%;height:100%;
    align-items:center;justify-content:center;
    font-family:'Yuji Syuku',serif;
    font-size:clamp(20px,2.6vw,32px);line-height:1.15;
    color:var(--kin-akarui);letter-spacing:.05em;
    background:radial-gradient(circle at 50% 38%, #2b313b, #15171c);
  }
  .face.no-img .face-fallback{display:flex;}
  .face.talk{} /* 話し始めの顔の動きはなし（うなずき・傾きとも無効） */
  .name-tag{
    margin-top:10px;font-family:'Yuji Syuku',serif;
    font-size:clamp(16px,2vw,24px);color:var(--kin-akarui);letter-spacing:.1em;
  }

  /* 吹き出し（巻物風） */
  .scroll{
    flex:1;position:relative;
    background:linear-gradient(180deg,var(--washi),var(--washi-kage));
    color:var(--sumi);
    border-radius:14px;
    padding:26px 30px;
    min-height:170px;
    box-shadow:0 12px 34px rgba(0,0,0,.45),inset 0 0 0 3px rgba(40,74,85,.25);
    border:2px solid var(--kin);
  }
  .scroll::before{ /* 吹き出しのしっぽ */
    content:"";position:absolute;left:-18px;top:48px;
    border-style:solid;border-width:14px 18px 14px 0;
    border-color:transparent var(--kin) transparent transparent;
  }
  .scroll .answer{
    font-family:'Klee One',serif;
    font-size:clamp(20px,2.6vw,32px);
    line-height:1.75;font-weight:600;
    letter-spacing:.02em;
  }
  .scroll .answer .em{color:var(--aka-fuka);font-weight:700;}

  /* 質問エリア */
  .ask-zone{
    background:rgba(30,33,40,.7);
    border:2px solid var(--kin);
    border-radius:14px;
    padding:18px 20px;
  }
  .ask-zone .label{
    font-size:clamp(15px,1.7vw,20px);color:var(--kin-akarui);
    margin-bottom:12px;letter-spacing:.1em;font-weight:700;
  }
  .input-row{display:flex;gap:12px;flex-wrap:wrap;}
  #q{
    flex:1;min-width:220px;
    font-family:'Zen Maru Gothic',sans-serif;
    font-size:clamp(18px,2.2vw,26px);font-weight:500;
    padding:14px 18px;border-radius:10px;border:none;
    background:var(--washi);color:var(--sumi);
  }
  #q:focus{outline:3px solid var(--kin-akarui);}
  .btn-ask{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(18px,2.2vw,26px);
    padding:14px 28px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--aka),var(--aka-fuka));
    color:var(--washi);letter-spacing:.1em;
    box-shadow:0 4px 0 #163039,0 6px 14px rgba(0,0,0,.4);
    transition:transform .08s;
  }
  .btn-ask:active{transform:translateY(4px);box-shadow:0 1px 0 #163039;}

  /* おすすめ問い */
  .topics{margin-top:8px;}
  .topics .t-label{font-size:clamp(13px,1.5vw,17px);color:var(--sumi-usu);margin:6px 2px 12px;letter-spacing:.08em;}
  .chips{display:flex;flex-wrap:wrap;gap:10px;}
  .chip{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;
    font-size:clamp(15px,1.8vw,21px);
    padding:11px 18px;border-radius:999px;cursor:pointer;
    background:rgba(242,236,224,.08);
    color:var(--washi);
    border:2px solid var(--kin);
    transition:all .15s;
  }
  .chip:hover{background:var(--kin);color:var(--sumi);transform:translateY(-2px);}

  .panel{display:none;}
  .panel.show{display:block;}

  /* 顔のリアクション */
  .face.seikai{box-shadow:0 0 0 4px var(--sumi),0 0 34px 6px rgba(185,192,201,.85),0 10px 30px rgba(0,0,0,.5);}

  footer{
    position:relative;z-index:2;text-align:center;
    font-size:13px;color:rgba(242,236,224,.4);
    padding:14px;letter-spacing:.1em;
  }
  /* ===== モード切替タブ ===== */
  nav.modes{
    position:relative;z-index:2;
    display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
    padding:14px 12px 0;
  }
  .mode-btn{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(15px,1.9vw,22px);
    padding:10px 22px;border-radius:999px;cursor:pointer;
    background:rgba(242,236,224,.07);
    color:var(--washi);
    border:2px solid var(--kin);letter-spacing:.08em;
    transition:all .15s;
  }
  .mode-btn:hover{transform:translateY(-2px);}
  .mode-btn.active{
    background:var(--kin);color:var(--sumi);
    box-shadow:0 0 18px rgba(185,192,201,.4);
  }

  /* ===== クイズ ===== */
  .quiz-meta{
    display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
    margin-bottom:14px;
  }
  .quiz-meta .stat{
    background:rgba(30,33,40,.7);border:2px solid var(--kin);
    border-radius:10px;padding:8px 14px;
    font-size:clamp(14px,1.6vw,19px);font-weight:700;color:var(--kin-akarui);
  }
  .quiz-meta .stat b{color:#f0c95a;}
  .quiz-choices{display:flex;flex-direction:column;gap:12px;}
  .qchoice{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;
    font-size:clamp(17px,2.1vw,24px);text-align:left;
    padding:15px 20px;border-radius:12px;cursor:pointer;
    background:var(--washi);color:var(--sumi);
    border:3px solid transparent;
    transition:all .12s;
  }
  .qchoice:hover{transform:translateX(4px);border-color:var(--kin);}
  .qchoice:disabled{cursor:default;opacity:.85;}
  .qchoice.correct{border-color:var(--midori);background:#dff0d2;}
  .qchoice.wrong{border-color:#b9472f;background:#f3d8d2;}
  .quiz-foot{display:flex;justify-content:center;margin-top:16px;}
  .btn-next{
    font-family:'Yuji Syuku',serif;
    font-size:clamp(17px,2.1vw,24px);
    padding:13px 30px;border:none;border-radius:10px;cursor:pointer;
    background:linear-gradient(180deg,var(--aka),var(--aka-fuka));
    color:var(--washi);letter-spacing:.1em;
    box-shadow:0 4px 0 #163039,0 6px 14px rgba(0,0,0,.4);
    transition:transform .08s;
  }
  .btn-next:active{transform:translateY(4px);box-shadow:0 1px 0 #163039;}

  /* ===== スタンプ帳 ===== */
  .stamp-head{
    text-align:center;margin-bottom:16px;
    font-size:clamp(15px,1.8vw,21px);color:var(--kin-akarui);font-weight:700;letter-spacing:.06em;
  }
  .stamp-head b{color:#f0c95a;font-size:1.25em;}
  .stamp-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;
  }
  .stamp{
    position:relative;overflow:hidden;
    aspect-ratio:1/1;border-radius:50%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border:3px dashed rgba(242,236,224,.28);
    background:rgba(30,33,40,.5);
    text-align:center;padding:6px;
    transition:transform .2s;
  }
  /* 獲得した絵は円いっぱいに広げ、円からはみ出した部分は切る */
  .stamp .art{position:absolute;inset:0;z-index:1;}
  .stamp .art img{width:100%;height:100%;display:block;object-fit:cover;}
  /* 未獲得のときに見せる分野名と進みぐあい */
  .stamp .lab{
    font-size:clamp(10px,1.4vw,15px);
    color:rgba(242,236,224,.5);font-weight:700;letter-spacing:.02em;line-height:1.25;
  }
  .stamp .prog{
    margin-top:3px;font-size:clamp(9px,1.1vw,12px);
    color:rgba(242,236,224,.38);
  }
  .stamp.earned{
    border:3px solid #b9472f;border-style:double;
    transform:rotate(-4deg);
  }
  /* 獲得後は画像の上に分野名をのせる */
  .stamp.earned .lab{
    position:absolute;left:0;right:0;bottom:0;z-index:2;margin:0;
    padding:10px 4px 6px;
    color:#fff;font-weight:800;
    text-shadow:0 1px 3px rgba(0,0,0,.85);
    background:linear-gradient(transparent,rgba(15,12,10,.72));
  }
  @media(max-width:560px){
    .stamp-grid{grid-template-columns:repeat(3,1fr);}
  }

  /* ===== スタンプ獲得トースト ===== */
  #toast{
    position:fixed;left:50%;top:18px;transform:translateX(-50%) translateY(-140%);
    z-index:9;
    background:linear-gradient(180deg,#fbe7c8,#f0d8ab);
    color:#5a2018;border:3px double #b9472f;border-radius:12px;
    padding:12px 22px;font-family:'Yuji Syuku',serif;
    font-size:clamp(16px,2vw,22px);font-weight:700;letter-spacing:.05em;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
    opacity:0;transition:transform .45s cubic-bezier(.2,1.3,.4,1),opacity .45s;
    pointer-events:none;white-space:nowrap;
  }
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

  @media(max-width:560px){
    .stage{flex-direction:column;align-items:center;}
    .scroll::before{display:none;}
    .nobunaga{order:-1;}
  }
  /* ===== 書院造 ===== */
  .shoin-hint{text-align:center;color:var(--sumi-usu);font-size:clamp(13px,1.6vw,18px);margin:4px 0 14px;letter-spacing:.04em;}
  .shoin-wrap{
    position:relative;max-width:680px;margin:0 auto;
    border:3px solid var(--kin);border-radius:12px;overflow:hidden;
    background:#0c0e12;box-shadow:0 10px 30px rgba(0,0,0,.45);
  }
  .shoin-wrap img{width:100%;display:block;}
  .shoin-overlay{position:absolute;inset:0;}
  .hot{
    position:absolute;width:clamp(28px,4.5vw,38px);height:clamp(28px,4.5vw,38px);
    border-radius:50%;transform:translate(-50%,-50%);
    background:rgba(185,71,47,.92);border:3px solid #fff;color:#fff;
    display:grid;place-items:center;font-family:'Zen Maru Gothic',sans-serif;
    font-weight:800;font-size:clamp(14px,2vw,18px);cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.6);
    animation:hotpulse 2s infinite;
  }
  .hot:hover{background:#d65a44;}
  .hot.active{background:var(--aka);animation:none;transform:translate(-50%,-50%) scale(1.18);}
  @keyframes hotpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.55)}50%{box-shadow:0 0 0 9px rgba(255,255,255,0)}}
  .shoin-tools{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;align-items:center;margin-top:14px;}
  .shoin-tools select{
    font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:clamp(14px,1.7vw,18px);
    padding:8px 12px;border-radius:8px;border:2px solid var(--kin);background:var(--washi);color:var(--sumi);
  }
  #shoinEditNote{display:none;text-align:center;color:var(--sumi-usu);font-size:clamp(12px,1.5vw,16px);margin-top:10px;line-height:1.6;}

</style>
</head>
<body>
  <header>
    <div class="mon">
      <span class="mon-maru">足</span>
      <div>
        <h1>義政くん</h1>
        <div class="sub">ひがしやま ものしり もんどう</div>
      </div>
      <span class="mon-maru">利</span>
    </div>
  </header>

  <div id="toast"></div>

  <nav class="modes">
    <button class="mode-btn active" data-mode="qa">ものしり</button>
    <button class="mode-btn" data-mode="quiz">クイズ</button>
    <button class="mode-btn" data-mode="stamp">スタンプ帳</button>
    <button class="mode-btn" data-mode="shoin">書院造</button>
  </nav>

  <main>
    <div class="stage">
      <div class="nobunaga">
        <div class="face" id="face">
          <img class="mouth closed" src="https://raw.githubusercontent.com/byakusen/hgeogel.yosimasa_kun/main/yosimasa.png" alt="足利義政"
               onerror="this.closest('.face').classList.add('no-img');">
          <img class="mouth open" src="https://raw.githubusercontent.com/byakusen/hgeogel.yosimasa_kun/main/yosimasa2.png" alt="" aria-hidden="true">
          <span class="face-fallback">足<br>利<br>義<br>政</span>
        </div>
        <div class="name-tag">足利義政</div>
      </div>
      <div class="scroll">
        <div class="answer" id="answer"></div>
      </div>
    </div>

    <div class="panel show" id="panel-qa">
      <div class="ask-zone">
        <div class="label">▼ 義政くんに きいてみよう</div>
        <div class="input-row">
          <input id="q" type="text" placeholder="しつもんを 入力してね（れい：銀閣ってなに？）" autocomplete="off">
          <button class="btn-ask" id="askBtn">きく</button>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-quiz">
      <div class="quiz-meta">
        <div class="stat">れんぞく正解：<b id="qStreak">0</b></div>
        <div class="stat">こたえた：<b id="qTotal">0</b></div>
        <div class="stat">正解：<b id="qCorrect">0</b></div>
      </div>
      <div class="quiz-choices" id="quizChoices"></div>
      <div class="quiz-foot">
        <button class="btn-next" id="quizNext">つぎの問題</button>
      </div>
    </div>

    <div class="panel" id="panel-stamp">
      <div class="stamp-head">あつめたスタンプ：<b id="stampCount">0</b> ／ 12</div>
      <div class="stamp-grid" id="stampGrid"></div>
    </div>

    <div class="panel" id="panel-shoin">
      <div class="shoin-hint">▼ 番号のついたところを押すと、名前と説明が出るよ</div>
      <div class="shoin-wrap" id="shoinWrap">
        <img src="https://raw.githubusercontent.com/byakusen/hgeogel.yosimasa_kun/main/shoindukuri.png" alt="書院造の部屋">
        <div class="shoin-overlay" id="shoinOverlay"></div>
      </div>
      <div class="shoin-tools">
        <button class="mode-btn" id="shoinEditToggle">位置をなおす（先生用）</button>
        <select id="shoinSelect" style="display:none"></select>
      </div>
      <div id="shoinEditNote">部品をえらんでから、絵の正しい場所をクリックすると、その番号がそこへ動きます。（なおした位置は、このパソコンにおぼえておきます）</div>
    </div>
  </main>

  <footer>クラスで楽しむ 室町もんどうアプリ／答えは小学生むけにやさしくまとめています</footer>

<script>
// ===== 足利義政の知識（小学4年生むけ・義政口調） =====
// キーワードに当てはまる問いが来たら、その答えを返す。
const KB = [
  // ===== 生い立ち・名前 =====
  {
    cat:"生いたち",
    keys:["生まれ","うまれ","いつ生","何年生","誕生","どこで生","生年"],
    a:"わしが生まれたのは1436年、京都じゃ。父は六代将軍・足利義教(あしかがよしのり)。室町幕府の将軍家にうまれた身よ。じゃが、わしが幼いころに父が思わぬ形で世を去り、わが家はゆれていた。そんな世に、わしは育ったのじゃ。"
  },
  {
    cat:"生いたち",
    keys:["名前","なまえ","義成","よしなり","名のり","改名","名を変え","幼名","ようみょう"],
    a:"わしは将軍となったはじめ、「義成(よしなり)」と名のっておった。のちに1453年、「義政(よしまさ)」とあらためたのじゃ。今みなが知る「足利義政」は、この名よ。名を変えるのは、武家ではよくあることであった。"
  },
  {
    cat:"生いたち",
    keys:["何代","なんだい","八代","8代","代目","何代目","将軍の何"],
    a:"わしは室町幕府の八代将軍じゃ。初代は足利尊氏(たかうじ)、三代は金閣を建てた義満(よしみつ)――わしの祖父にあたる。その流れをつぐ八人目が、このわしというわけよ。"
  },
  {
    cat:"生いたち",
    keys:["どんな時代","時代","じだい","いつの人","室町","むろまち","何時代"],
    a:"わしが生きたのは室町時代の後半じゃ。将軍の力はおとろえ、各地の有力な大名たちが力をつけていた、乱れのきざしの世であった。やがてわしの代に大きな戦が起き、世は戦国へとかたむいていく……。"
  },
  {
    cat:"生いたち",
    keys:["子ども時代","こどものころ","小さいころ","幼い","将軍になった","いつ将軍","8歳","若くして"],
    a:"わしは八つのころに、次の将軍にえらばれた。じゃが幼すぎて、すぐにはつとめられぬ。十三、四のころ、正式に八代将軍となったのじゃ。幼くして重い役をせおう――それがわしの始まりであった。"
  },
  {

// 入力にいちばん合う答えをさがす（該当した問題の番号も返す）
function findAnswer(text){
  const t = (text||"").replace(/\s/g,"");
  if(!t) return null;
  let bestIdx=-1, bestScore=0;
  for(let i=0;i<KB.length;i++){
    let score=0;
    for(const k of KB[i].keys){ if(t.includes(k)) score += k.length; }
    if(score>bestScore){bestScore=score; bestIdx=i;}
  }
  return bestScore>0 ? {a:KB[bestIdx].a, idx:bestIdx, cat:KB[bestIdx].cat} : null;
}

const answerEl = document.getElementById('answer');
const faceEl = document.getElementById('face');
let typing=null;
let mouthTimer=null;
function startMouth(){
  stopMouth();
  // 口を開いた絵と閉じた絵をすばやく切り替えて「ぱくぱく」させる
  mouthTimer=setInterval(()=>{ faceEl.classList.toggle('talking-open'); },130);
}
function stopMouth(){
  if(mouthTimer){ clearInterval(mouthTimer); mouthTimer=null; }
  faceEl.classList.remove('talking-open'); // 話し終わりは口を閉じた絵にもどす
}
function speak(text, mood){
  faceEl.classList.remove('talk','seikai','zannen'); void faceEl.offsetWidth;
  faceEl.classList.add(mood || 'talk');
  startMouth();
  if(typing) clearInterval(typing);
  answerEl.innerHTML="";
  let i=0;
  typing=setInterval(()=>{
    if(i>=text.length){clearInterval(typing); stopMouth(); return;}
    answerEl.appendChild(document.createTextNode(text[i]));
    i++;
  },32);
}

function handleAsk(text){
  const r = findAnswer(text);
  if(r){
    speak(r.a);
    record('kb:'+r.idx, r.cat);   // 探検スタンプに記録
  }
  else{ speak(NOT_FOUND[Math.floor(Math.random()*NOT_FOUND.length)]); }
}

// 記録する（同じ問いは一度だけ数える）
function record(token, cat){
  if(!seen.has(token)){
    seen.add(token);
    if(cat){ seenCat[cat]=(seenCat[cat]||0)+1; }
  }
  checkStamps();
  if(panelMode==='stamp') renderStamps();
}

// スタンプ獲得を判定（新しく取れたらおしらせ）
function checkStamps(){
  STAMPS.forEach(s=>{
    if(!earnedSet.has(s.lab) && s.test()){
      earnedSet.add(s.lab);
      showToast('「'+s.lab+'」のスタンプをゲット！');
    }
  });
  const c=document.getElementById('stampCount');
  if(c) c.textContent = earnedSet.size;
}

// スタンプ帳をえがく
function renderStamps(){
  const grid=document.getElementById('stampGrid');
  grid.innerHTML='';
  STAMPS.forEach(s=>{
    const earned=earnedSet.has(s.lab);
    const d=document.createElement('div');
    d.className='stamp'+(earned?' earned':'');
    if(earned){
      d.innerHTML='<div class="art">'+(ART[s.lab]||'')+'</div>'
        +'<div class="lab">'+s.lab+'</div>';
    }else{
      d.innerHTML='<div class="lab">'+s.lab+'</div>'
        +'<div class="prog">'+s.prog()+'</div>';
    }
    grid.appendChild(d);
  });
  document.getElementById('stampCount').textContent = earnedSet.size;
}

   exp:"幕府はそのあとも百年あまり続いた。じゃが力はもどらず、やがて織田信長のころに終わるのじゃ。"}
];

let curQuiz=null, lastQuizIdx=-1, answered=false;

function newQuiz(){
  answered=false;
  faceEl.classList.remove('seikai');
  let i;
  do{ i=Math.floor(Math.random()*QUIZ.length); }while(QUIZ.length>1 && i===lastQuizIdx);
  lastQuizIdx=i; curQuiz=QUIZ[i];
  speak('【クイズ】'+curQuiz.q);
  const box=document.getElementById('quizChoices');
  box.innerHTML='';
  curQuiz.choices.forEach((c,ci)=>{
    const b=document.createElement('button');
    b.className='qchoice'; b.textContent=c;
    b.onclick=()=>answerQuiz(ci,b);
    box.appendChild(b);
  });
}

function answerQuiz(ci,btn){
  if(answered) return;
  answered=true; qTotal++;
  const buttons=document.querySelectorAll('#quizChoices .qchoice');
  buttons.forEach(b=>b.disabled=true);
  buttons[curQuiz.ans].classList.add('correct');
  if(ci===curQuiz.ans){
    quizCorrectTotal++; streak++;
    record('quiz:'+lastQuizIdx, curQuiz.cat);
    speak('せいかい！　'+curQuiz.exp, 'seikai');
  }else{
    btn.classList.add('wrong'); streak=0;
    speak('おしい、ちがうのじゃ。　'+curQuiz.exp);
  }
  updateQuizMeta();
}

function updateQuizMeta(){
  document.getElementById('qStreak').textContent=streak;
  document.getElementById('qTotal').textContent=qTotal;
  document.getElementById('qCorrect').textContent=quizCorrectTotal;
}
document.getElementById('quizNext').onclick=()=>newQuiz();

// ===== モード切替 =====
const panels={
  qa:document.getElementById('panel-qa'),
  quiz:document.getElementById('panel-quiz'),
  stamp:document.getElementById('panel-stamp'),
  shoin:document.getElementById('panel-shoin')
};
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.onclick=()=>{
    const m=btn.dataset.mode; panelMode=m;
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active', b===btn));
    for(const key in panels){ panels[key].classList.toggle('show', key===m); }
    faceEl.classList.remove('seikai');
    if(m==='quiz'){ curQuiz ? speak('【クイズ】'+curQuiz.q) : newQuiz(); }
    else if(m==='stamp'){
      renderStamps();
      speak('これまでに集めたスタンプじゃ。ものしりモードで問いをしらべ、クイズに正解すると、スタンプがたまっていくぞ。ぜんぶで12こ、集められるかな？');
    }
    else if(m==='shoin'){
      renderShoin();
      speak('ここは書院造(しょいんづくり)の部屋じゃ。床の間に違い棚、仏間に付書院……今の和室のもとになった、わしの東山文化を代表する部屋のつくりよ。番号のついたところを押してみよ。名と、そのいわれを語ってしんぜよう。');
    }
    else{ speak(GREET); }
  };
});

// ===== 書院造（クリックで名前と説明） =====
const SHOIN = [
  {id:0,name:"仏間",         x:17,y:45,exp:"これは仏間(ぶつま)じゃ。ご先祖さまをまつる仏壇(ぶつだん)を置くための場所よ。家の中でも、とくに大切にされる一角での。黒と金にかがやく仏壇が、おごそかにおさめられておる。"},
  {id:1,name:"天袋",         x:44,y:43,exp:"これは天袋(てんぶくろ)じゃ。違い棚や床の間の上のほうにつけた、小さな戸だなよ。手のとどきにくい上にあるゆえ、ふだんあまり使わぬ物をしまっておくのに使うのじゃ。"},
  {id:2,name:"床の間",       x:67,y:40,exp:"これは床の間(とこのま)じゃ。部屋の正面に、少し高くこしらえた『かざりの場所』よ。掛け軸(かけじく)や花をかざる、部屋でいちばん大切なところとされた。お客は床の間を背にした席が、上の座(ざ)であったのじゃ。"},
  {id:3,name:"違い棚",       x:43,y:63,exp:"これは違い棚(ちがいだな)じゃ。高さをずらして組んだ棚でな、本や茶の道具、美しい品をかざる。床の間のとなりによく作られた、見た目にも雅(みやび)な棚よ。"},
  {id:4,name:"床柱",         x:59,y:50,exp:"これは床柱(とこばしら)じゃ。床の間のわきに立てる、大切な柱よ。わざと木のかわや形をいかした、見ばえのよい木をえらぶことが多い。床の間の『顔』ともいえる柱なのじゃ。"},
  {id:5,name:"付書院・障子", x:83,y:51,exp:"これは付書院(つけしょいん)じゃ。窓ぎわにこしらえた、机のような出っぱりよ。ここの障子(しょうじ)から入る光で書きものをした。『書院造(しょいんづくり)』という名のもとにもなった、大事なところじゃ。"},
  {id:6,name:"地袋（中央）", x:44,y:81,exp:"これは地袋(じぶくろ)じゃ。床(ゆか)に近い、下のほうにつけた戸だなよ。上の戸だなが天袋(てんぶくろ)、下の戸だながこの地袋。よく使う物をしまうのに、ちょうどよいのじゃ。"},
  {id:7,name:"地袋（仏間の下）", x:17,y:85,exp:"これも地袋(じぶくろ)じゃ。仏間の下にもうけた、下のほうの戸だなよ。床に近いので物の出し入れがしやすく、ふだん使いの品をしまっておくのじゃ。"},
  {id:8,name:"畳",           x:33,y:95,exp:"これは畳(たたみ)じゃ。いぐさで作った床を、部屋いちめんにしきつめておる。畳を部屋ぜんたいにしくのは、この書院造からひろまった。今の和室のもとよ。"}
];
let activeShoin=-1, shoinEdit=false;
const shoinWrap=document.getElementById('shoinWrap');
const shoinOverlay=document.getElementById('shoinOverlay');
const shoinSelect=document.getElementById('shoinSelect');

function loadShoinPos(){
  try{ const s=localStorage.getItem('shoinPos2'); if(s){ const o=JSON.parse(s);
    SHOIN.forEach(p=>{ if(o[p.id]){ p.x=o[p.id].x; p.y=o[p.id].y; } }); } }catch(e){}
}
function saveShoinPos(){
  try{ const o={}; SHOIN.forEach(p=>{ o[p.id]={x:p.x,y:p.y}; }); localStorage.setItem('shoinPos2',JSON.stringify(o)); }catch(e){}
}
function renderShoin(){
  shoinOverlay.innerHTML='';
  SHOIN.forEach(p=>{
    const h=document.createElement('div');
    h.className='hot'+(activeShoin===p.id?' active':'');
    h.style.left=p.x+'%'; h.style.top=p.y+'%';
    h.textContent=(p.id+1); h.title=p.name;
    h.onclick=(e)=>{
      e.stopPropagation();
      if(shoinEdit){ shoinSelect.value=p.id; return; }
      activeShoin=p.id; speak('【書院造】'+p.exp); renderShoin();
    };
    shoinOverlay.appendChild(h);
  });
}
// 部品をえらぶプルダウンを用意
SHOIN.forEach(p=>{ const o=document.createElement('option'); o.value=p.id; o.textContent=(p.id+1)+'. '+p.name; shoinSelect.appendChild(o); });

// 先生用：絵の上をクリックして番号の位置を直す
shoinWrap.addEventListener('click',(e)=>{
  if(!shoinEdit) return;
  const r=shoinWrap.getBoundingClientRect();
  const x=Math.round(((e.clientX-r.left)/r.width)*1000)/10;
  const y=Math.round(((e.clientY-r.top)/r.height)*1000)/10;
  const id=parseInt(shoinSelect.value,10);
  const p=SHOIN.find(s=>s.id===id);
  if(p){ p.x=x; p.y=y; saveShoinPos(); renderShoin(); }
});
document.getElementById('shoinEditToggle').onclick=function(){
  shoinEdit=!shoinEdit;
  this.classList.toggle('active',shoinEdit);
  this.textContent = shoinEdit ? 'なおすのを やめる' : '位置をなおす（先生用）';
  shoinSelect.style.display = shoinEdit ? 'inline-block':'none';
  document.getElementById('shoinEditNote').style.display = shoinEdit ? 'block':'none';
  shoinWrap.style.cursor = shoinEdit ? 'crosshair':'default';
};
loadShoinPos();

// 最初のあいさつ
speak(GREET);
</script>
